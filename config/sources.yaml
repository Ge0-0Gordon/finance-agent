rss:
  enabled: true
  timeout_seconds: 10
  groups:
    official_ai:
      enabled: true
      feeds:
        - id: openai-news
          name: OpenAI News
          url: https://openai.com/news/rss.xml
          enabled: true
          max_items: 10
        - id: google-ai
          name: Google AI Blog
          url: https://blog.google/technology/ai/rss/
          enabled: true
          max_items: 10
        - id: google-deepmind
          name: Google DeepMind Blog
          url: https://deepmind.google/blog/rss.xml
          enabled: true
          max_items: 10
        - id: nvidia-blog
          name: NVIDIA Blog
          url: https://blogs.nvidia.com/feed/
          enabled: true
          max_items: 10
        - id: aws-ml
          name: AWS Machine Learning Blog
          url: https://aws.amazon.com/blogs/machine-learning/feed/
          enabled: true
          max_items: 10
        - id: meta-engineering
          name: Meta Engineering
          url: https://engineering.fb.com/feed/
          enabled: true
          max_items: 10

    research:
      enabled: true
      feeds:
        - id: mit-ai
          name: MIT News AI
          url: https://news.mit.edu/topic/mitartificial-intelligence2-rss.xml
          enabled: true
          max_items: 10
        - id: huggingface-blog
          name: Hugging Face Blog
          url: https://huggingface.co/blog/feed.xml
          enabled: true
          max_items: 10
        - id: microsoft-research
          name: Microsoft Research
          url: https://www.microsoft.com/en-us/research/feed/
          enabled: true
          max_items: 10

    china_ai:
      enabled: true
      feeds:
        - id: qbitai
          name: 量子位
          url: https://www.qbitai.com/feed
          enabled: true
          max_items: 10

    finance_tech:
      enabled: true
      feeds:
        - id: 36kr
          name: 36氪
          url: https://36kr.com/feed
          enabled: true
          max_items: 10

search:
  enabled: false
  provider: tavily
  max_results: 10
