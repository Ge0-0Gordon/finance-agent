services:
  ai-finance-agent:
    build: .
    environment:
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0}
    ports:
      - "8501:8501"
    volumes:
      - ./outputs:/app/outputs
